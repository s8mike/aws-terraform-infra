# #
# # PHASE 4 — CI/CD AUTOMATION
# #
# # This workflow:
# #   1. Validates Terraform
# #   2. Builds Docker image
# #   3. Pushes image to Amazon ECR
# #   4. Deploys infrastructure to ECS using Terraform
# #   5. Verifies ECS and ALB health
# #
# # Architecture Notes:
# # - Uses shared Terraform backend bucket
# # - Uses isolated Terraform state key
# # - Uses ECR managed outside Terraform
# # - Runtime infrastructure remains ephemeral
# #
# # Terraform Backend State:
# #   mecandjeo-school/dev/terraform.tfstate
# #
# # Shared Backend Bucket:
# #   mecandjeo-infra-dev-tfstate
# #
