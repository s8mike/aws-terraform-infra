# ─────────────────────────────────────────────────────────────────────────────
# GitHub Actions CI/CD Pipeline
# Project:     mecandjeo-infra — AWS Terraform Infrastructure
# Description: Validates Terraform code, tags and pushes Docker image to ECR,
#              auto-deploys to dev, and deploys to prod with manual approval.
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   AWS_ACCESS_KEY_ID          — IAM user access key
#   AWS_SECRET_ACCESS_KEY      — IAM user secret key
#   AWS_ACCOUNT_ID             — 776735193826
#   AWS_REGION                 — us-east-1
#   TF_STATE_BUCKET_DEV        — mecandjeo-infra-dev-tfstate
#   TF_STATE_BUCKET_PROD       — mecandjeo-infra-prod-tfstate
#   TF_DYNAMODB_TABLE_DEV      — mecandjeo-infra-dev-tfstate-lock
#   TF_DYNAMODB_TABLE_PROD     — mecandjeo-infra-prod-tfstate-lock
#   ALLOWED_SSH_CIDR_DEV       — your IP/32 for dev
#   ALLOWED_SSH_CIDR_PROD      — your IP/32 for prod
#
# Required GitHub Environment (Settings → Environments):
#   production                 — with required reviewers set
# ─────────────────────────────────────────────────────────────────────────────

name: Terraform Infrastructure CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Prevent concurrent pipeline runs on the same branch
# If a new push comes in while a run is in progress, cancel the old one
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_VERSION: "1.5.0"
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: "mecandjeo-infra-dev"
  IMAGE_TAG: ${{ github.sha }}

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — VALIDATE
# Runs on every push and pull request to main
# Checks formatting, validates syntax, and runs plan
# No AWS resources are created in this job
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Install the specified Terraform version
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # Step 3 — Configure AWS credentials for plan
      # Uses GitHub secrets — never hardcode credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Step 4 — Check Terraform formatting
      # terraform fmt -check exits with error if any file is not formatted
      # This enforces consistent code style across the team
      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: .

      # Step 5 — Initialize Terraform with dev backend
      # Downloads provider plugins and configures S3 backend
      - name: Terraform Init (Dev)
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET_DEV }}" \
            -backend-config="key=dev/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_DYNAMODB_TABLE_DEV }}" \
            -backend-config="encrypt=true"
        working-directory: resources/dev

      # Step 6 — Validate Terraform configuration syntax
      # Checks that all resource references and variable types are correct
      - name: Terraform Validate
        run: terraform validate
        working-directory: resources/dev

      # Step 7 — Run Terraform plan and save output
      # This shows exactly what would change without applying anything
      # The plan is saved as an artifact for review on pull requests
      - name: Terraform Plan (Dev)
        run: |
          terraform plan \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="project_name=mecandjeo-infra" \
            -var="environment=dev" \
            -var="allowed_ssh_cidr=${{ secrets.ALLOWED_SSH_CIDR_DEV }}" \
            -var="vpc_cidr=10.0.0.0/16" \
            -var='public_subnet_cidrs=["10.0.1.0/24","10.0.2.0/24"]' \
            -var='private_subnet_cidrs=["10.0.3.0/24","10.0.4.0/24"]' \
            -var='availability_zones=["us-east-1a","us-east-1b"]' \
            -var="instance_type=t3.micro" \
            -var="container_image=nginx:latest" \
            -var="container_port=80" \
            -var="task_cpu=256" \
            -var="task_memory=512" \
            -var="desired_count=2" \
            -var="health_check_path=/" \
            -var="min_capacity=2" \
            -var="max_capacity=6" \
            -var="scale_out_cpu_threshold=70" \
            -var="scale_in_cpu_threshold=30" \
            -out=tfplan-dev \
            -no-color 2>&1 | tee plan-output-dev.txt
        working-directory: resources/dev

      # Step 8 — Upload plan output as artifact
      # This allows engineers to review the plan on pull requests
      # before any merge or deployment happens
      - name: Upload Plan Output
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-dev
          path: resources/dev/plan-output-dev.txt
          retention-days: 5

      # Step 9 — Post plan summary to PR as a comment
      # Only runs on pull requests — not on direct pushes
      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('resources/dev/plan-output-dev.txt', 'utf8');
            const maxLength = 65000;
            const truncated = plan.length > maxLength
              ? plan.substring(0, maxLength) + '\n\n... output truncated ...'
              : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan — Dev\n\`\`\`\n${truncated}\n\`\`\``
            });

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — DOCKER IMAGE
# Runs only on push to main (not on pull requests)
# Tags nginx:latest and pushes to ECR with the git commit SHA
# When you build a real application replace the docker pull/tag
# steps with: docker build -t $IMAGE_TAG .
# ─────────────────────────────────────────────────────────────────────────────
  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      image_uri: ${{ steps.build.outputs.image_uri }}

    steps:
      # Step 1 — Check out repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Configure AWS credentials for ECR access
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Step 3 — Log in to Amazon ECR
      # This generates a temporary Docker login token valid for 12 hours
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Step 4 — Pull nginx, tag with commit SHA, push to ECR
      # PLACEHOLDER: When you build a real application replace the
      # docker pull and docker tag lines with:
      #   docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
      # The rest of the step stays the same
      - name: Tag and push image to ECR
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "Using nginx:latest as placeholder image"
          echo "Replace with docker build when real application exists"

          # Pull the public nginx image
          docker pull nginx:latest

          # Tag with full ECR URI and git commit SHA for traceability
          # Every deployment is traceable to an exact commit
          docker tag nginx:latest \
            $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

          # Also tag as latest for convenience
          docker tag nginx:latest \
            $ECR_REGISTRY/$ECR_REPOSITORY:latest

          # Push both tags to ECR
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          # Output the full image URI for use in subsequent jobs
          echo "image_uri=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            >> $GITHUB_OUTPUT

          echo "Image pushed: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — DEPLOY DEV
# Runs only on push to main after validate and docker jobs pass
# Automatically applies Terraform changes to the dev environment
# No manual approval required — dev is always auto-deployed
# ─────────────────────────────────────────────────────────────────────────────
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: [validate, docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment:
      name: development
      url: http://${{ steps.apply.outputs.alb_dns_name }}

    steps:
      # Step 1 — Check out repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Install Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      # Step 3 — Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Step 4 — Initialize with dev backend
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET_DEV }}" \
            -backend-config="key=dev/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_DYNAMODB_TABLE_DEV }}" \
            -backend-config="encrypt=true"
        working-directory: resources/dev

      # Step 5 — Apply Terraform changes to dev
      # -auto-approve skips the interactive yes/no prompt
      # The image URI from the docker job is passed as container_image
      # so ECS always runs the image that was just pushed
      - name: Terraform Apply
        id: apply
        run: |
          terraform apply \
            -auto-approve \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="project_name=mecandjeo-infra" \
            -var="environment=dev" \
            -var="allowed_ssh_cidr=${{ secrets.ALLOWED_SSH_CIDR_DEV }}" \
            -var="vpc_cidr=10.0.0.0/16" \
            -var='public_subnet_cidrs=["10.0.1.0/24","10.0.2.0/24"]' \
            -var='private_subnet_cidrs=["10.0.3.0/24","10.0.4.0/24"]' \
            -var='availability_zones=["us-east-1a","us-east-1b"]' \
            -var="instance_type=t3.micro" \
            -var="container_image=${{ needs.docker.outputs.image_uri }}" \
            -var="container_port=80" \
            -var="task_cpu=256" \
            -var="task_memory=512" \
            -var="desired_count=2" \
            -var="health_check_path=/" \
            -var="min_capacity=2" \
            -var="max_capacity=6" \
            -var="scale_out_cpu_threshold=70" \
            -var="scale_in_cpu_threshold=30" \
            -no-color
          echo "alb_dns_name=$(terraform output -raw alb_dns_name)" \
            >> $GITHUB_OUTPUT
        working-directory: resources/dev

      # Step 6 — Print deployment summary
      - name: Deployment Summary
        run: |
          echo "═══════════════════════════════════════"
          echo "  DEV DEPLOYMENT COMPLETE"
          echo "═══════════════════════════════════════"
          echo "  Environment : dev"
          echo "  Image       : ${{ needs.docker.outputs.image_uri }}"
          echo "  Commit      : ${{ github.sha }}"
          echo "  Branch      : ${{ github.ref_name }}"
          echo "  ALB URL     : http://${{ steps.apply.outputs.alb_dns_name }}"
          echo "═══════════════════════════════════════"

# ─────────────────────────────────────────────────────────────────────────────
# JOB 4 — DEPLOY PROD
# Runs only after dev deployment succeeds
# Requires manual approval via GitHub Environment protection rules
# Set up: Settings → Environments → production → Required reviewers
# An engineer must click Approve in GitHub Actions before this runs
# ─────────────────────────────────────────────────────────────────────────────
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker, deploy-dev]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    # The production environment has required reviewers configured
    # in GitHub Settings → Environments → production
    # This job will PAUSE here until a reviewer approves
    environment:
      name: production
      url: http://${{ steps.apply.outputs.alb_dns_name }}

    steps:
      # Step 1 — Check out repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Install Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      # Step 3 — Configure AWS credentials
      # In a real setup this would use a separate prod IAM role
      # with more restricted permissions than the dev role
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Step 4 — Initialize with prod backend
      # Production state is in a completely separate S3 bucket
      # so a failed prod apply cannot affect dev state
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET_PROD }}" \
            -backend-config="key=prod/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_DYNAMODB_TABLE_PROD }}" \
            -backend-config="encrypt=true"
        working-directory: resources/prod

      # Step 5 — Run plan for prod before applying
      # Even though this is post-approval, always plan before apply
      # The plan output confirms exactly what will change in production
      - name: Terraform Plan
        run: |
          terraform plan \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="project_name=mecandjeo-infra" \
            -var="environment=prod" \
            -var="allowed_ssh_cidr=${{ secrets.ALLOWED_SSH_CIDR_PROD }}" \
            -var="vpc_cidr=10.0.0.0/16" \
            -var='public_subnet_cidrs=["10.0.1.0/24","10.0.2.0/24"]' \
            -var='private_subnet_cidrs=["10.0.3.0/24","10.0.4.0/24"]' \
            -var='availability_zones=["us-east-1a","us-east-1b"]' \
            -var="instance_type=t3.micro" \
            -var="container_image=${{ needs.docker.outputs.image_uri }}" \
            -var="container_port=80" \
            -var="task_cpu=512" \
            -var="task_memory=1024" \
            -var="desired_count=2" \
            -var="health_check_path=/" \
            -var="min_capacity=2" \
            -var="max_capacity=10" \
            -var="scale_out_cpu_threshold=70" \
            -var="scale_in_cpu_threshold=30" \
            -no-color
        working-directory: resources/prod

      # Step 6 — Apply to production
      - name: Terraform Apply
        id: apply
        run: |
          terraform apply \
            -auto-approve \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="project_name=mecandjeo-infra" \
            -var="environment=prod" \
            -var="allowed_ssh_cidr=${{ secrets.ALLOWED_SSH_CIDR_PROD }}" \
            -var="vpc_cidr=10.0.0.0/16" \
            -var='public_subnet_cidrs=["10.0.1.0/24","10.0.2.0/24"]' \
            -var='private_subnet_cidrs=["10.0.3.0/24","10.0.4.0/24"]' \
            -var='availability_zones=["us-east-1a","us-east-1b"]' \
            -var="instance_type=t3.micro" \
            -var="container_image=${{ needs.docker.outputs.image_uri }}" \
            -var="container_port=80" \
            -var="task_cpu=512" \
            -var="task_memory=1024" \
            -var="desired_count=2" \
            -var="health_check_path=/" \
            -var="min_capacity=2" \
            -var="max_capacity=10" \
            -var="scale_out_cpu_threshold=70" \
            -var="scale_in_cpu_threshold=30" \
            -no-color
          echo "alb_dns_name=$(terraform output -raw alb_dns_name)" \
            >> $GITHUB_OUTPUT
        working-directory: resources/prod

      # Step 7 — Print production deployment summary
      - name: Deployment Summary
        run: |
          echo "═══════════════════════════════════════"
          echo "  PRODUCTION DEPLOYMENT COMPLETE"
          echo "═══════════════════════════════════════"
          echo "  Environment : prod"
          echo "  Image       : ${{ needs.docker.outputs.image_uri }}"
          echo "  Commit      : ${{ github.sha }}"
          echo "  Branch      : ${{ github.ref_name }}"
          echo "  Approved by : ${{ github.actor }}"
          echo "  ALB URL     : http://${{ steps.apply.outputs.alb_dns_name }}"
          echo "═══════════════════════════════════════"