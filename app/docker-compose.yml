# ─────────────────────────────────────────────────────────────
# MecanjeoOps Dashboard — Local Development
# Run: docker compose up --build
# Open: http://localhost:8000
# ─────────────────────────────────────────────────────────────

version: '3.9'

services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=dev
      - PROJECT_NAME=mecandjeo-infra
      - AWS_REGION=us-east-1
      - APP_VERSION=1.0.0
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped